# Portal Phase 0 stack — PostgreSQL + API + Web UI
#
# Start from repo root:
#   docker compose -f portal/docker/docker-compose.portal.yml up -d --build
#
# Verify:
#   curl -f http://localhost:8000/health
#   open http://localhost:3000/health-ui

services:
  portal-redis:
    image: redis:7-alpine
    container_name: portal-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  portal-db:
    image: postgres:17
    container_name: portal-db
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports:
      - "5433:5432"
    volumes:
      - portal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal"]
      interval: 5s
      timeout: 5s
      retries: 10

  portal-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: backend
    container_name: portal-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql://portal:portal@portal-db:5432/portal
      REDIS_URL: redis://portal-redis:6379/0
      APP_ENV: development
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      SESSION_COOKIE_SECURE: "false"
      PORTAL_PUBLIC_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:3000
      LDAP_BIND_PASSWORD: admin
      OIDC_CLIENT_SECRET: portal-dev-secret-change-in-prod
      # Phase 3 PKI — Step CA root (auth-test stack). Run step-ca-bootstrap first.
      PKI_ROOT_CA_PATH: /etc/ssl/portal-ca/root_ca.crt
      # Phase 5 — Superset provisioning (host Superset dev stack on port 8088)
      SUPERSET_INTERNAL_URL: http://host.docker.internal:8088
      SUPERSET_PUBLIC_URL: http://localhost:8088
      SUPERSET_SERVICE_USERNAME: portal_provisioner
      SUPERSET_TEMPLATE_DATABASE_ID: "1"
      SUPERSET_RLS_DATASET_NAMES: portal_export_data
      # Phase 7 — AI + MCP JWT (dev defaults; override in portal/backend/.env)
      MCP_JWT_SECRET: portal-dev-mcp-jwt-secret-change-in-prod
      MCP_JWT_ISSUER: portal
      MCP_JWT_AUDIENCE: superset-mcp
      SUPERSET_LAUNCH_JWT_SECRET: portal-dev-mcp-jwt-secret-change-in-prod
      AI_RATE_LIMIT_PER_HOUR: "30"
    ports:
      - "8000:8000"
    depends_on:
      portal-db:
        condition: service_healthy
      portal-redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../backend:/app/backend
      # Mount Step CA root from auth-test (read-only). File appears after bootstrap.
      - ./auth-test/pki/root_ca.crt:/etc/ssl/portal-ca/root_ca.crt:ro

  portal-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: frontend
    container_name: portal-web
    ports:
      - "3000:80"
    depends_on:
      - portal-api

volumes:
  portal_db_data:
